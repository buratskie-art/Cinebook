<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Register - CineBook</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #111;
        }
        .auth-form {
            background: #222;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6);
        }
        .auth-form h2 {
            margin-top: 0;
            color: #fff;
            text-align: center;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #ccc;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #1a1a1a;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #e50914;
            box-shadow: 0 0 8px rgba(229, 9, 20, 0.3);
        }
        .auth-form button {
            width: 100%;
            padding: 12px;
            background: #e50914;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 200ms ease;
        }
        .auth-form button:hover {
            background: #bf0810;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
        }
        .auth-footer a {
            color: #e50914;
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .back-to-home {
            display: inline-block;
            margin-bottom: 20px;
            color: #e50914;
            text-decoration: none;
            font-weight: 600;
        }
        .back-to-home:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-page">
        <div class="auth-form">
            <a href="index.html" class="back-to-home">← Back to Home</a>
            <h2>🎬 CineBook Register</h2>
            
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Create a username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password">
            </div>
            
            <button onclick="register()">Register</button>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Login here</a>
            </div>
        </div>
    </div>

    <script src="database.js"></script>
    <script src="script.js"></script>

</body>
</html>
