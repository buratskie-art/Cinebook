<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CineBook Local Storage Migration</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            padding: 32px;
            background: #101010;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
        }
        .migration-panel {
            max-width: 900px;
            margin: 0 auto;
            background: #1a1a1a;
            border: 1px solid rgba(229, 9, 20, 0.25);
            border-radius: 8px;
            padding: 24px;
        }
        label {
            display: block;
            margin: 18px 0 8px;
            color: #e50914;
            font-weight: 700;
        }
        input, textarea {
            width: 100%;
            box-sizing: border-box;
            background: #0b0b0b;
            border: 1px solid #333;
            border-radius: 6px;
            color: #fff;
            padding: 12px;
            font: inherit;
        }
        textarea {
            min-height: 260px;
            font-family: Consolas, monospace;
            font-size: 13px;
        }
        button {
            margin-top: 18px;
            padding: 12px 18px;
            border: 0;
            border-radius: 6px;
            background: #e50914;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        .status {
            margin-top: 16px;
            padding: 12px;
            border-radius: 6px;
            background: #222;
            color: #ddd;
        }
    </style>
</head>
<body>
    <main class="migration-panel">
        <h1>CineBook Local Storage Migration</h1>
        <p>Use this in the browser that contains your CineBook localStorage data. It sends every localStorage key to MongoDB under <code>state.localStorage</code>, and also fills the main CineBook collections.</p>

        <label for="apiUrl">MongoDB API URL</label>
        <input id="apiUrl" value="/api/state" placeholder="https://your-vercel-site.vercel.app/api/state">

        <label for="preview">Local storage data that will be sent</label>
        <textarea id="preview" readonly></textarea>

        <button onclick="migrateLocalStorage()">Move Local Storage to MongoDB</button>
        <div id="status" class="status">Ready.</div>
    </main>

    <script src="database.js"></script>
    <script>
        function readJson(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                return raw ? JSON.parse(raw) : fallback;
            } catch {
                return fallback;
            }
        }

        function dumpLocalStorage() {
            const dump = {};
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                dump[key] = localStorage.getItem(key);
            }
            return dump;
        }

        function buildState() {
            const localStorageDump = dumpLocalStorage();
            return {
                movies: readJson('cinebook:admin:movies', window.CineBookSeedData?.movies || []),
                theaters: readJson('cinebook:admin:theaters', window.CineBookSeedData?.defaultAdminTheaters || []),
                showtimes: readJson('cinebook:admin:showtimes', window.CineBookSeedData?.defaultAdminShowtimes || []),
                reservations: readJson('cinebook:reservations', []),
                payments: readJson('cinebook:payments', []),
                paymentSubmissions: readJson('cinebook:paymentSubmissions', []),
                emailLog: readJson('cinebook:emailLog', []),
                users: {
                    username: localStorage.getItem('cinebook:user') || '',
                    password: localStorage.getItem('cinebook:pass') || '',
                    memberSince: localStorage.getItem('cinebook:memberSince') || ''
                },
                preferences: {
                    emailNotif: localStorage.getItem('cinebook:emailNotif') || '',
                    promoNotif: localStorage.getItem('cinebook:promoNotif') || ''
                },
                localStorage: localStorageDump
            };
        }

        function refreshPreview() {
            document.getElementById('preview').value = JSON.stringify(buildState(), null, 2);
        }

        async function migrateLocalStorage() {
            const status = document.getElementById('status');
            const apiUrl = document.getElementById('apiUrl').value.trim();
            if (!apiUrl) {
                status.textContent = 'Enter your Vercel API URL first.';
                return;
            }

            status.textContent = 'Sending localStorage data to MongoDB...';
            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        source: 'manual-local-storage-migration',
                        state: buildState()
                    })
                });

                const result = await response.json();
                if (!response.ok || !result.ok) {
                    throw new Error(result.error || 'Migration failed.');
                }

                status.textContent = 'Success. MongoDB was overwritten with this browser localStorage data.';
            } catch (error) {
                status.textContent = 'Failed: ' + error.message;
            }
        }

        refreshPreview();
    </script>
</body>
</html>
