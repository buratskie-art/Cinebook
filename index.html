<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>CineBook</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="curtain-rod"></div>
    <div class="curtain-valance" aria-hidden="true">
        <div class="valance-swag valance-left"></div>
        <div class="valance-swag valance-center"></div>
        <div class="valance-swag valance-right"></div>
        <div class="valance-rope valance-rope-left"></div>
        <div class="valance-rope valance-rope-center"></div>
        <div class="valance-rope valance-rope-right"></div>
    </div>

    <div class="curtain-left">
      <div class="curtain-folds"></div>
      <div class="curtain-tieback"></div>
    </div>

    <div class="curtain-right">
      <div class="curtain-folds"></div>
      <div class="curtain-tieback"></div>
    </div>

    <header>
        <h1>CineBook</h1>

        <div class="header-controls">
            <input type="text" id="search" placeholder="Search movies..." onkeyup="searchMovie()">

            <select id="genreFilter" onchange="filterGenre()">
                <option value="All">All Genres</option>
            </select>

            <div class="auth-buttons">
                <button id="loginBtn" onclick="showLoginPopover(this)">Login</button>
                <button id="registerBtn" onclick="window.location.href='register.html'">Register</button>
                <button id="dashboardBtn" onclick="window.location.href='dashboard.html'" style="display:none;">Dashboard</button>
                <button id="logoutBtn" onclick="logoutUser()" style="display:none;">Logout</button>
            </div>
        </div>
    </header>

    <!-- FEATURED -->
    <section class="featured">
        <button class="banner-control banner-prev" type="button" onclick="previousSlide()" aria-label="Previous banner">&lsaquo;</button>
        <img id="slide" src="movie1.jpg">
        <button class="banner-control banner-next" type="button" onclick="nextSlide()" aria-label="Next banner">&rsaquo;</button>
    </section>

    <!-- MOVIES -->
    <section id="movieList" class="movies"></section>

    <footer>
        <p>&copy; 2026 CineBook. All rights reserved. | <a href="privacy.html">Privacy</a> | <a href="terms.html">Terms</a> | <a href="contact.html">Contact</a></p>
    </footer>

    <script src="database.js"></script>
    <script src="cinebook-data-sync.js"></script>
    <script src="script.js"></script>

</body>
</html>
