<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Movie Details - CineBook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <a id="backButton" href="index.html">Back</a>

    <main class="movie-detail-page">
        <section class="movie-detail-grid">
            <div class="movie-poster-panel">
                <h1 id="title"></h1>
                <div id="posterWrap">
                    <img id="poster" src="" alt="Movie poster">
                </div>
                <div class="movie-meta-strip">
                    <div id="year"></div>
                    <div id="genre"></div>
                </div>
            </div>

            <div class="movie-flow-panel">
                <div id="synopsisWrap" class="movie-flow-card synopsis-card">
                    <div id="synopsis"></div>
                </div>

                <div id="theaterSection" class="movie-flow-card" style="display:none;">
                    <h2>Select Theater</h2>
                    <div id="theatersContainer"></div>
                </div>

                <div id="timeSection" class="movie-flow-card" style="display:none;">
                    <h2>Select Time Slot</h2>
                    <p class="selected-theater-line">Theater: <strong id="selectedTheaterDisplayText"></strong></p>
                    <div id="timeSlotsContainer"></div>
                </div>

                <div id="selectedShowtimeInfo" class="movie-flow-card selected-showtime-card" style="display:none;">
                    <p><strong>Selected Theater:</strong> <span id="selectedTheaterText"></span></p>
                    <p><strong>Selected Time:</strong> <span id="selectedShowtimeText"></span></p>
                    <p><strong>Price per Seat:</strong> PHP <span id="selectedPriceText">0</span></p>
                </div>
            </div>
        </section>

        <section id="seatSection" class="seat-section-panel" style="display:none;">
            <h2>Select Your Seats</h2>
            <p>Selected: <span id="count">0</span> seats | Total: PHP <span id="total">0</span></p>
            <p style="color: #999; font-size: 13px;">Capacity: 240 seats in Blocks A, B, and C</p>
            <div class="seat-legend">
                <span><i class="legend-seat available"></i> Available</span>
                <span><i class="legend-seat selected"></i> Selected</span>
                <span><i class="legend-seat pending"></i> Pending Verification</span>
                <span><i class="legend-seat reserved"></i> Reserved</span>
            </div>
            <div class="seats" id="seatContainer"></div>
            <button onclick="confirmBooking()">Proceed to Payment Instructions</button>
        </section>
    </main>

    <script src="database.js"></script>
    <script src="cinebook-data-sync.js"></script>
    <script src="script.js"></script>

</body>
</html>
